{% extends "base.html" %}
{% block title %}{{ code }} - {{ msg }}{% endblock %}

{% block content %}
<div class="container error-page">
    <div class="error-card">
        <div class="error-code">{{ code }}</div>
        <h2>{{ msg }}</h2>
        <p>抱歉，您访问的页面出现了问题。</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-primary">
            <i class="bi bi-house"></i> 返回首页
        </a>
    </div>
</div>
{% endblock %}
